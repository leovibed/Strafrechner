            --bg-table-hover: #1f293d;
            --bg-category: #0f172a;
            --accent-emerald: #10b981;
            --accent-emerald-hover: #059669;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-red-hover: #dc2626;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #2e374a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            width: 100%;
        }

        /* Header Area */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            position: relative;
        }

        .header-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .header-title {
            text-align: center;
            flex-grow: 1;
        }

        .header-title h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        .header-title p.subtitle {
            font-size: 0.95rem;
            color: var(--accent-emerald);
            font-weight: 600;
            letter-spacing: 2px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .header-placeholder {
            width: 80px; /* Balancing the layout */
        }

        /* Controls Card */
        .controls-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .controls-top {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 42px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent-emerald);
        }

        .discount-inputs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .discount-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--bg-input);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .discount-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .discount-group input {
            width: 60px;
            background: transparent;
            border: none;
            color: var(--accent-emerald);
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        .controls-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-emerald {
            background-color: var(--accent-emerald);
            color: #000;
        }

        .btn-emerald:hover {
            background-color: var(--accent-emerald-hover);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }

        .btn-red {
            background-color: var(--accent-red);
            color: #fff;
        }

        .btn-red:hover {
            background-color: var(--accent-red-hover);
        }

        .btn-blue {
            background-color: var(--accent-blue);
            color: #fff;
        }

        .btn-blue:hover {
            opacity: 0.9;
        }

        /* Table Area */
        .table-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--bg-table-header);
            color: var(--text-muted);
            padding: 14px 18px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        tr.category-row td {
            background-color: var(--bg-category);
            color: var(--accent-emerald);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        tr.law-row {
            cursor: pointer;
            transition: background-color 0.15s;
        }

        tr.law-row:hover {
            background-color: var(--bg-table-hover);
        }

        tr.law-row.selected {
            background-color: rgba(16, 185, 129, 0.15);
        }

        tr.law-row.selected td:first-child {
            border-left: 4px solid var(--accent-emerald);
        }

        .badge-he {
            background-color: rgba(59, 130, 246, 0.2);
            color: var(--accent-blue);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .badge-money {
            color: var(--accent-emerald);
            font-weight: 600;
        }

        .badge-court {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: 600;
        }

        /* Modal / Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .modal-header {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .summary-box {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .summary-item:last-child {
            margin-bottom: 0;
        }

        .details-list {
            max-height: 220px;
            overflow-y: auto;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
            font-size: 0.88rem;
        }

        .details-item {
            color: var(--text-main);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .details-item span.highlight {
            color: var(--accent-emerald);
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.6;
        }
    </style>
</head>

                </div>
                <div class="summary-item">
                    <span>Gesamte Hafteinheiten:</span>
                    <strong class="badge-he" id="resHE">0 HE</strong>
                </div>

                <div class="details-list" id="detailsContainer" style="display: none;">
                    <!-- Details Dynamic -->
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-blue" id="toggleDetailsBtn"><i class="fa-solid fa-eye"></i> Details anzeigen</button>
                <button class="btn btn-emerald" id="copyBtn"><i class="fa-solid fa-copy"></i> Strafen kopieren</button>
                <button class="btn btn-red" id="closeModalBtn">Schließen</button>
            </div>
        </div>
    </div>

    <!-- Discrete Footer -->
    <footer>

            // BtMG

            { cat: "Betäubungsmittelgesetz (BtMG)", para: "§ 14 Abs. 1", code: "BtMG", name: "Verkauf von Betäubungsmitteln", money: 40000, he: 25, court: false },
            { cat: "Betäubungsmittelgesetz (BtMG)", para: "§ 15 Abs. 1", code: "BtMG", name: "Besitz von Betäubungsmitteln", money: 25000, he: 10, court: false },
            { cat: "Betäubungsmittelgesetz (BtMG)", para: "§ 16 Abs. 1", code: "BtMG", name: "Bereitstellung von Infrastruktur und logistische Förderung", money: 50000, he: 35, court: false },

            { cat: "Straßenverkehrsordnung (StVO)", para: "§ 9 Abs. 2", code: "StVO", name: "Fahren trotz Verwahrung/Beschlagnahme des Führerscheins", money: 20000, he: 10, court: false },
            { cat: "Straßenverkehrsordnung (StVO)", para: "§ 9 Abs. 3", code: "StVO", name: "Nichtmitführen der Fahrerlaubnis", money: 2500, he: 0, court: false },
            { cat: "Straßenverkehrsordnung (StVO)", para: "§ 10", code: "StVO", name: "Kennzeichenmissbrauch", money: 40000, he: 25, court: false },
            { cat: "Straßenverkehrsordnung (StVO)", para: "§ 11", code: "StVO", name: "Missbräuchliches Ausgeben oder Besitz von Kennzeichen", money: 20000, he: 20, court: false },

            // WaffG
            { cat: "Waffengesetz (WaffG)", para: "§ 5", code: "WaffG", name: "Besitz von illegalen Langwaffen", money: 25000, he: 20, court: false },
            { cat: "Waffengesetz (WaffG)", para: "§ 6", code: "WaffG", name: "Besitz von illegalen Kurzwaffen", money: 15000, he: 20, court: false },
            { cat: "Waffengesetz (WaffG)", para: "§ 7", code: "WaffG", name: "Besitz von Staatswaffen", money: 30000, he: 30, court: false },
            { cat: "Waffengesetz (WaffG)", para: "§ 8", code: "WaffG", name: "Besitz von illegalen Stich- und Nahkampfwaffen", money: 15000, he: 15, court: false },
            { cat: "Waffengesetz (WaffG)", para: "§ 9", code: "WaffG", name: "Besitz von Waffenteilen und Modifikationen", money: 10000, he: 15, court: false },
            { cat: "Waffengesetz (WaffG)", para: "§ 10", code: "WaffG", name: "Verbot des Führens bewaffneter Kraftfahrzeuge im öffentlichen Raum", money: 50000, he: 60, court: false },
            { cat: "Waffengesetz (WaffG)", para: "§ 14", code: "WaffG", name: "Tragen einer Waffe in Waffenverbotszonen", money: 10000, he: 0, court: false },
            { cat: "Waffengesetz (WaffG)", para: "§ 15", code: "WaffG", name: "Unbegründete Schussabgabe", money: 12500, he: 0, court: false }
        ];

        let selectedIndices = new Set();

        // Elements
        const tableBody = document.getElementById('lawTableBody');
        const searchInput = document.getElementById('searchInput');
        const discountMoneyInput = document.getElementById('discountMoney');
        const discountHEInput = document.getElementById('discountHE');
        const calcBtn = document.getElementById('calcBtn');
        const resetBtn = document.getElementById('resetBtn');

        const modal = document.getElementById('resultModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const toggleDetailsBtn = document.getElementById('toggleDetailsBtn');
        const copyBtn = document.getElementById('copyBtn');
        
        const resMoney = document.getElementById('resMoney');
        const resHE = document.getElementById('resHE');
        const detailsContainer = document.getElementById('detailsContainer');

        // Render Table
        function renderTable(filter = "") {
            tableBody.innerHTML = "";
            let currentCategory = "";

            laws.forEach((law, index) => {
                const searchStr = `${law.para} ${law.code} ${law.name} ${law.cat}`.toLowerCase();
                
                if (searchStr.includes(filter.toLowerCase())) {
                    // Category Header
                    if (law.cat !== currentCategory && filter === "") {
                        currentCategory = law.cat;
                        const catRow = document.createElement('tr');
                        catRow.className = 'category-row';
                        catRow.innerHTML = `<td colspan="4">${currentCategory}</td>`;
                        tableBody.appendChild(catRow);
                    }

                    const row = document.createElement('tr');
                    row.className = `law-row ${selectedIndices.has(index) ? 'selected' : ''}`;
                    row.onclick = () => toggleSelect(index, row);

                    row.innerHTML = `
                        <td><strong>${law.para} ${law.code}</strong> ${law.court ? '<span class="badge-court">Gerichtspflicht</span>' : ''}</td>
                        <td>${law.name}</td>
                        <td class="badge-money">${law.money > 0 ? law.money.toLocaleString('de-DE') + '$' : 'Nach Ermessen'}</td>
                        <td><span class="badge-he">${law.he} HE</span></td>
                    `;
                    tableBody.appendChild(row);
                }
            });
        }

        // Toggle Selection
        function toggleSelect(index, rowElement) {
            if (selectedIndices.has(index)) {
                selectedIndices.delete(index);
                rowElement.classList.remove('selected');
            } else {
                selectedIndices.add(index);
                rowElement.classList.add('selected');
            }
        }

        // Search Filter
        searchInput.addEventListener('input', (e) => {
            renderTable(e.target.value);
        });

        // Calculate
        calcBtn.addEventListener('click', () => {
            let totalMoney = 0;
            let totalHE = 0;
            let detailsHTML = "";

            const discMoney = Math.min(100, Math.max(0, parseFloat(discountMoneyInput.value) || 0));
            const discHE = Math.min(100, Math.max(0, parseFloat(discountHEInput.value) || 0));

            // Extract selected laws and sort by money descending
            const selectedLaws = Array.from(selectedIndices)
                .map(index => laws[index])
                .sort((a, b) => b.money - a.money);

            let count = 1;
            selectedLaws.forEach(law => {
                totalMoney += law.money;
                totalHE += law.he;

                detailsHTML += `
                    <div class="details-item">
                        ${count++}. ${law.name} <span class="highlight">${law.para} ${law.code}</span>: <strong>(${law.money.toLocaleString('de-DE')}$, ${law.he} HE)</strong> ${law.court ? '<span class="badge-court">Gerichtspflicht</span>' : ''}
                    </div>
                `;
            });

            // Apply discounts
            totalMoney = totalMoney * (1 - discMoney / 100);
            totalHE = totalHE * (1 - discHE / 100);

            resMoney.innerText = `${Math.round(totalMoney).toLocaleString('de-DE')}$`;
            resHE.innerText = `${Math.round(totalHE)} HE`;
            
            detailsContainer.innerHTML = detailsHTML || "<div class='details-item'>Keine Straftaten ausgewählt.</div>";

            modal.classList.add('active');
        });

        // Reset
        resetBtn.addEventListener('click', () => {
            selectedIndices.clear();
            discountMoneyInput.value = 0;
            discountHEInput.value = 0;
            searchInput.value = "";
            renderTable();
        });

        // Toggle Details
        toggleDetailsBtn.addEventListener('click', () => {
            if (detailsContainer.style.display === "none") {
                detailsContainer.style.display = "block";
                toggleDetailsBtn.innerHTML = '<i class="fa-solid fa-eye-slash"></i> Details ausblenden';
            } else {
                detailsContainer.style.display = "none";
                toggleDetailsBtn.innerHTML = '<i class="fa-solid fa-eye"></i> Details anzeigen';
            }
        });

        // Copy Results to Clipboard
        copyBtn.addEventListener('click', () => {
            let textToCopy = `=== STRAFRECHNER SW&T ===\n`;
            textToCopy += `Gesamt Bußgeld: ${resMoney.innerText}\n`;
            textToCopy += `Gesamt HE: ${resHE.innerText}\n\n`;
            textToCopy += `Ausgewählte Straftaten (nach Höhe sortiert):\n`;

            const selectedLaws = Array.from(selectedIndices)
                .map(index => laws[index])
                .sort((a, b) => b.money - a.money);

            let count = 1;
            selectedLaws.forEach(law => {
                textToCopy += `${count++}. ${law.name} ${law.para} ${law.code} (${law.money.toLocaleString('de-DE')}$, ${law.he} HE)${law.court ? ' [Gerichtspflicht]' : ''}\n`;
            });

            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Kopiert!';
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                }, 1500);
            });
        });

        // Close Modal
        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // Initialize
        renderTable();
    </script>
</body>
